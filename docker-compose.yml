services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: symfony-baseball-app:latest
        ports:
            - "8000:80"
        environment:
            APP_ENV: dev
            APP_SECRET: DockerSecret123
            DATABASE_URL: 'mysql://app:!ChangeMe!@database:3306/app?serverVersion=11.1&charset=utf8mb4'
            MAILER_DSN: 'smtp://mailer:1025'
        volumes:
            - ./:/var/www/html:cached
            - vendor:/var/www/html/vendor
            - var:/var/www/html/var
            - database
            - mailer

    database:
        image: mariadb:11.1
        environment:
            MYSQL_DATABASE: app
            MYSQL_USER: app
            MYSQL_PASSWORD: '!ChangeMe!'
            MYSQL_ROOT_PASSWORD: '!ChangeMe!'
        volumes:
            - database_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    mailer:
        image: axllent/mailpit
        ports:
            - "1025:1025"
            - "8025:8025"
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        ports:
            - "8080:80"
        environment:
            PMA_HOST: database
            PMA_USER: root
            PMA_PASSWORD:
        depends_on:
            - database

volumes:
    database_data:
    vendor:
    var:
